name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          
      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release --verbose